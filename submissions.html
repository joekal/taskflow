<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Soumissions — Projets sélectionnés</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
  <div class="max-w-4xl mx-auto p-8">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold">Soumissions reçues</h1>
      <div class="flex items-center gap-3">
        <a href="index.html" class="px-3 py-1 rounded border">Retour</a>
        <button id="clearBtn" class="px-3 py-1 rounded bg-red-100 text-red-700">Effacer</button>
      </div>
    </header>

    <div id="list" class="space-y-4">
      <p class="text-sm text-gray-500">Chargement…</p>
    </div>
  </div>

  <script>
    function render() {
      const listEl = document.getElementById('list');
      const submissions = JSON.parse(localStorage.getItem('submissions') || '[]');
      if (!submissions.length) {
        listEl.innerHTML = '<div class="p-6 bg-white rounded shadow">Aucune soumission enregistrée.</div>';
        return;
      }

      // Group by project
      const byProject = submissions.reduce((acc, s) => {
        (acc[s.projectName] = acc[s.projectName] || []).push(s);
        return acc;
      }, {});

      const html = Object.keys(byProject).map(name => {
        const items = byProject[name].map(it => {
          return `
            <div class="p-3 border rounded mb-2 bg-white">
              <div class="text-sm text-slate-500">${new Date(it.timestamp).toLocaleString('fr-FR')}</div>
              <div class="font-medium">${it.phone}</div>
            </div>`;
        }).join('');

        return `
          <section class="p-4 bg-white rounded shadow">
            <h2 class="font-bold mb-2">${name} <span class="text-sm text-slate-400">(${byProject[name].length})</span></h2>
            ${items}
          </section>`;
      }).join('');

      listEl.innerHTML = html;
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (confirm('Effacer toutes les soumissions ?')) {
        localStorage.removeItem('submissions');
        render();
      }
    });

    // protect page with admin password check
    (async () => {
      const hash = localStorage.getItem('adminPasswordHash');
      if (!hash) {
        // if missing, create default
        const h = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('admin2024!'));
        const hex = Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('');
        localStorage.setItem('adminPasswordHash', hex);
      }

      const entered = prompt('Mot de passe administrateur:');
      if (!entered) {
        document.body.innerHTML = '<p class="p-8">Accès annulé.</p>';
        return;
      }
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(entered));
      const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
      if (hex !== localStorage.getItem('adminPasswordHash')) {
        document.body.innerHTML = '<p class="p-8">Mot de passe incorrect.</p>';
        return;
      }

      render();
    })();
  </script>
</body>
</html>
